name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: |
          bun install
          bun build ./src/index.mts --compile --outfile ts-prj-generator-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x64
          path: ts-prj-generator-linux-x64
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: |
          bun install
          bun build ./src/index.mts --compile --outfile ts-prj-generator-macos
      - uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: ts-prj-generator-macos